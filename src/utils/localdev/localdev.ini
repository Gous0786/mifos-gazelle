#-----------------------------------------------------------
; # Operations Web -- Angular/Node.js app served with nginx
; # For webapp type:
; #   - Adds hostPath volume definition to deployment
; #   - Does NOT add volumeMount (configure via values.yaml to avoid conflicts)
; #   - Does NOT override image (uses existing nginx image from values.yaml)
; #   - Does NOT add command (nginx CMD serves files)
; #
; # Manual step required: Update config/ph_values.yaml to mount the volume:
; #   operations-web:
; #     deployment:
; #       extraVolumeMounts:
; #         - name: local-code
; #           mountPath: /usr/share/nginx/html
; # ----------------------------------------------------------------------------
[operations-web]
directory = ${gazelle-home}/repos/ph_template/helm/ph-ee-engine/operations-web
app_type = webapp
hostpath = ${HOME}/ph-ee-operations-web/dist
# Repository checkout settings
checkout_enabled = true
reponame = https://github.com/openMF/ph-ee-operations-web
branch_or_tag = mifos-v2.0.0
